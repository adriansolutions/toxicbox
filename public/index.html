<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Toxic Box</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    overflow-x:hidden;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
/*
========================================
ADD THIS CSS
========================================
*/

:root{
    --primary:#ff0066;
    --secondary:#6a00ff;

    --bg:#0d0d0d;
    --card:rgba(255,255,255,0.05);
    --card2:rgba(255,255,255,0.08);
    --text:white;
    --border:rgba(255,255,255,0.08);
}

body{
    margin:0;
    overflow:hidden; /* IMPORTANT: prevents page scroll bugs */
    height:100vh;
    background:var(--bg);
    color:var(--text);
}

/* LIGHT MODE */

body.light-mode{
    --bg:#f4f4f4;
    --card:white;
    --card2:#eeeeee;
    --text:#111;
    --border:#dddddd;
    --btn-bg:#000000BD;
}

body.light-mode .sidebar{
    background:#ffffff;
    color:#111;
    border-right:1px solid #dddddd;
}

.chat-input{
    flex-shrink:0;
    bottom:0;
    left:0;
    width:100%;

    background:var(--bg);
    z-index:1000;
}

/* UPDATE THESE */

.header,
.chat-input,
.login-box,
.user-tag{
    background:var(--card);
    border:1px solid var(--border);
}

.input-group input,
.input-group select,
.input-wrap input{
    background:var(--card2);
    color:var(--text);
}

.send-btn,
.start-btn{
    background:linear-gradient(
        135deg,
        var(--primary),
        var(--secondary)
    );
}


.app{
    position:fixed;
    top:70px;
    left:0px;
    right:0;
    bottom:0;

    display:flex;
    flex-direction:column;

    overflow:hidden;
}

/* HEADER */

.header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:auto;
    padding:18px;
    backdrop-filter:blur(12px);

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-circle{
    width:42px;
    height:42px;
    border-radius:50%;
    background:linear-gradient(135deg,#ff0066,#6a00ff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:18px;
}

.logo h1{
    font-size:20px;
    font-weight:700;
}

.user-tag{
    padding:10px 16px;
    border-radius:12px;
    font-size:14px;
    font-weight:500;
}

/* LOGIN SCREEN */

.login-screen{
    position:absolute;
    inset:0;
    background:#0d0d0d;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    padding:20px;
}

.login-box{
    width:100%;
    max-width:420px;
    backdrop-filter:blur(18px);
    padding:35px;
    border-radius:28px;
}

.login-box h2{
    font-size:32px;
    margin-bottom:10px;
}

.login-box p{
    color:#bfbfbf;
    margin-bottom:25px;
    line-height:1.5;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#ccc;
}

.input-group input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:14px;
    font-size:15px;
}

.start-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    background:linear-gradient(135deg,#ff0066,#6a00ff);
    color:white;
    transition:0.3s;
}

.start-btn:hover{
    transform:translateY(-2px);
}

/* CHAT AREA */

.chat-container{
    height:100%;
    width:100%;

    overflow-y:auto;   /* 👈 THIS MUST BE HERE */
    overflow-x:hidden;

    display:flex;
    flex-direction:column; /* keeps messages stacked properly */

    gap:8px;

    min-height:0; /* 🔥 CRITICAL FOR FLEX BUG FIX */
    padding:10px;
    padding-bottom:90px;
    box-sizing:border-box;
}

.message{
    flex-shrink:0; /* 🔥 prevents shrinking bug */

    display:block;
    max-width:80%;
    width:fit-content;

    padding:16px;
    border-radius:18px;
    animation:pop 0.2s ease;

    background:rgba(255,255,255,0.06);

    word-break:break-word;
}


@keyframes pop{
    from{
        opacity:0;
        transform:scale(0.95);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.message.own{
    margin-left:auto;
    background:linear-gradient(135deg,#ff0066,#6a00ff);
}

.message .name{
    font-size:13px;
    font-weight:600;
    margin-bottom:8px;
    opacity:0.9;
}

.message .text{
    font-size:15px;
    line-height:1.5;
    word-wrap:break-word;
}

.input-wrap{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:10px;
    padding:10px;
}

.settings-btn{
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;

    background:#222;
    color:white;
    font-size:18px;

    cursor:pointer;
    flex-shrink:0;

    display:flex;              /* 🔥 IMPORTANT */
    align-items:center;       /* center icon */
    justify-content:center;   /* center icon */

    line-height:1;            /* 🔥 removes vertical shift */
    padding:0;
}

.input-wrap input{
    flex:1;
    height:45px;
    min-width:0;
    box-sizing:border-box;

    border:none;
    outline:none;
    padding:0 12px;

    border-radius:14px;
    font-size:15px;
}

.send-btn{
    height:45px;
    flex-shrink:0;

    border:none;
    padding:0 22px;
    border-radius:14px;

    cursor:pointer;

    background:linear-gradient(135deg,#ff0066,#6a00ff);
    color:white;
    font-weight:600;
    font-size:15px;

    display:flex;
    align-items:center;
    justify-content:center;
}

.empty{
    text-align:center;
    color:#888;
    margin-top:auto;
    margin-bottom:auto;
    font-size:15px;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:8px;
}

.actions button{
    background:rgba(255,255,255,0.08);
    border:none;
    color:inherit;
    padding:6px 10px;
    border-radius:10px;
    font-size:12px;
    cursor:pointer;
    transition:0.2s;
}

.actions button:hover{
    background:rgba(255,255,255,0.15);
    transform:scale(1.05);
}

.reactions{
    margin-top:6px;
    font-size:13px;
    opacity:0.85;
}

.sidebar{
    position:fixed;
    left:0;
    top:70px;
    height:calc(100vh - 70px); /* 👈 fills remaining space */
    bottom:0;
    width:90px;
    background:rgba(27, 26, 26, 1);
    border-right:1px solid rgba(255,255,255,0.08);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
    gap:15px;
    transition:0.3s;

    transform:translateX(-100%); /* hidden by default */
    z-index:1000;
}

.sidebar.active{
    transform:translateX(0);
}


/* push chat when sidebar is visible */

.app.full{
    margin-left:0;
}
.toggle-btn{
    background:var(--btn-bg);
    border:none;
    color:white;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
}


.room{
    width:55px;
    height:55px;
    border-radius:50%;
    background:rgba(255,255,255,0.06);
    display:flex;
    align-items:center;
    justify-content:center;
    position: relative;
    cursor:pointer;
    font-weight:700;
    transition:0.2s;
}

.room:hover{
    transform:scale(1.05);
}

.room.active{
    background:linear-gradient(135deg,#ff0066,#6a00ff);
}

.badge {
    top: -5px;
    right: -5px;
    background: #ff3b3b;
    border-radius: 50%;
    min-width: 16px;
    height: 16px;
    font-size: 9px;
    border: 2px solid #111;
}

.time-sep{
    flex-shrink:0;   /* 🔥 prevents shrinking */
    width:100%;
    display:block;
    text-align:center;
    font-size:11px;
    opacity:0.5;
    margin:10px 0;
}

.system-msg{
    flex-shrink:0;   /* 🔥 prevents shrinking */
    width:100%;
    display:block;
    text-align:center;
    font-size:12px;
    opacity:0.7;
    margin:8px 0;
    color:#ff4d4d;
}


/* Panel */
.settings-panel{
    position:fixed;
    right:-260px;
    top:0;
    width:250px;
    height:100%;
    background:var(--bg);
    color:var(--text);
    padding:20px;
    transition:0.3s;
    z-index:998;
}

.settings-panel.active{
    right:0;
}

/* Setting row */
.setting-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
}

/* SWITCH STYLE */
.switch{
    position:relative;
    display:inline-block;
    width:45px;
    height:24px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:#555;
    border-radius:34px;
    transition:0.3s;
}

.slider:before{
    content:"";
    position:absolute;
    height:18px;
    width:18px;
    left:3px;
    bottom:3px;
    background:white;
    border-radius:50%;
    transition:0.3s;
}

input:checked + .slider{
    background:#4caf50;
}

input:checked + .slider:before{
    transform:translateX(20px);
}

/* MOBILE */

@media(max-width:700px){

    .header{
        padding:14px;
    }

    .logo h1{
        font-size:18px;
    }

    .chat-container{
        padding:16px;
    }

    .message{
        max-width:90%;
    }

    .input-wrap{
        gap:8px;
    }
    .chat-input{
    padding:8px;
}

    .send-btn{
        padding:0 18px;
    }
     .sidebar{
        width:70px;
    }

}
</style>
</head>
<body>
<div id="app-root">
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h2>Toxic Box</h2>
        <p>
            Enter your username and join the public chat room instantly.
        </p>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="usernameInput" placeholder="Enter username">
        </div>

        <button class="start-btn" onclick="startChat()">
            Enter Chat
        </button>
    </div>
</div>

<div class="app">
   <div class="header">
       <button onclick="toggleSidebar()" class="toggle-btn">☰</button>
        <div class="logo">
            <div class="logo-circle">TB</div>
            <h1>Toxic Box</h1>
        </div>

        <div class="user-tag" id="userTag">
            Guest
        </div>
    </div>
<div id="settingsPanel" class="settings-panel">

    <h3>Settings</h3>

    <div class="setting-item">
        <span>Dark Mode</span>

        <label class="switch">
            <input type="checkbox" id="themeToggle"
    onchange="setMode(this.checked ? 'dark' : 'light')">
            <span class="slider"></span>
        </label>
    </div>

</div>

    <div class="chat-container" id="chatContainer">
    <div class="empty" id="emptyText">
        No messages yet...
    </div>
</div>

<div class="chat-input">

    <div class="input-wrap">

        <button class="settings-btn" onclick="toggleSettings()">
            ⚙️
        </button>

        <input
            type="text"
            id="messageInput"
            placeholder="Type your message..."
        >

        <button class="send-btn" onclick="sendMessage()">
            Send
        </button>

    </div>

</div>
    <div class="sidebar" id="sidebar"></div>

</div>

</div>
</body>
</html>
